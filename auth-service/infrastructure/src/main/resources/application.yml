server:
  port: 8080

spring:
  datasource:
    url: jdbc:h2:mem:authdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    defer-datasource-initialization: true

  sql:
    init:
      mode: always

security:
  jwt:
    secret: mySecretKeyabcd123456789mySecretKey123456789zxyw
    expiration-ms: 3600000

sso:
  client-id: auth-service-client
  redirect-uri: http://localhost:4200/sso/callback
  authorizeUrl: https://fake-sso-provider.com/oauth/authorize
  valid-code: valid-code
  mock-user: sso-user